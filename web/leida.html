<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radar Scan Terminal</title>
<style>
:root {
  --terminal-bg: #0d1117;
  --phosphor-green: #00ff00;
  --glow: 0 0 10px var(--phosphor-green);
  --scanline: rgba(0,0,0,0.4);
  --font: 'Courier New', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  background:var(--terminal-bg);
  display:grid;
  place-items:center;
  font-family:var(--font);
  color:var(--phosphor-green);
  text-transform:uppercase;
  overflow:hidden;
  animation:flicker 0.2s infinite alternate;
}
/* CRT扫描线 */
body::before {
  content:'';
  position:fixed; inset:0;
  background:repeating-linear-gradient(
    transparent 0px, var(--scanline) 1px, transparent 2px
  );
  pointer-events:none; z-index:99;
}
@keyframes flicker {
  0%{opacity:0.97;}100%{opacity:1;}
}

/* 报错文字 */
.error {
  position:fixed; top:2rem;
  font-size:1.2rem;
  color:#ff0000;
  text-shadow:0 0 8px red;
}

/* 雷达主体 */
.radar {
  width:360px; height:360px;
  border:2px solid var(--phosphor-green);
  border-radius:50%;
  position:relative;
  box-shadow:var(--glow);
  background:radial-gradient(circle at center, transparent 30%, rgba(0,255,0,0.05) 100%);
  overflow:hidden;
}

/* 网格线 */
.radar::before, .radar::after {
  content:''; position:absolute;
  top:50%; left:50%; width:100%; height:1px;
  background:var(--phosphor-green); opacity:0.2;
  transform:translate(-50%,-50%);
}
.radar::after { transform:translate(-50%,-50%) rotate(90deg); }
.circle {
  position:absolute; border:1px solid var(--phosphor-green);
  border-radius:50%; opacity:0.2;
}
.circle:nth-child(1){ width:66%; height:66%; top:17%; left:17%; }
.circle:nth-child(2){ width:33%; height:33%; top:33.5%; left:33.5%; }

/* 旋转扫描线 */
.scan {
  position:absolute; top:50%; left:50%;
  width:50%; height:2px;
  background:linear-gradient(90deg, transparent, var(--phosphor-green));
  transform-origin:0% 50%;
  transform:translate(0, -50%);
  animation:rotate 4s linear infinite;
  box-shadow:0 0 12px var(--phosphor-green);
}
@keyframes rotate {
  0%{transform:translate(0, -50%) rotate(0deg);}
  100%{transform:translate(0, -50%) rotate(360deg);}
}

/* 脉冲扩散 */
.pulse {
  position:absolute; top:50%; left:50%;
  border:1px solid var(--phosphor-green);
  border-radius:50%; opacity:0;
  animation:pulse 4s ease-out infinite;
}
.pulse:nth-child(1){animation-delay:0s;}
.pulse:nth-child(2){animation-delay:1s;}
.pulse:nth-child(3){animation-delay:2s;}
.pulse:nth-child(4){animation-delay:3s;}
@keyframes pulse {
  0%{width:0; height:0; opacity:0.8; transform:translate(-50%,-50%);}
  100%{width:100%; height:100%; opacity:0; transform:translate(-50%,-50%);}
}

/* 终端提示行 */
.term {
  position:fixed; bottom:2rem;
  font-size:1rem; text-shadow:var(--glow);
}
.term::after {
  content:'█'; animation:blink 1s step-end infinite;
}
@keyframes blink {
  50%{opacity:0;}
}

/* 雷达目标点 */
.target {
  position:absolute;
  width:6px; height:6px;
  background:#aaaaaa;
  border-radius:50%;
  box-shadow:0 0 8px #aaaaaa;
  animation:targetBlink 2s ease-in-out infinite;
}
.target.alert {
  background:#cc0000;
  box-shadow:0 0 12px #cc0000;
}
@keyframes targetBlink {
  0%, 100%{opacity:1; transform:scale(1);}
  50%{opacity:0.3; transform:scale(0.8);}
}
</style>
</head>
<body>
<div class="error">LINK FETCH ERROR</div>
<div class="radar" id="radar">
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="scan"></div>
  <div class="pulse"></div>
  <div class="pulse"></div>
  <div class="pulse"></div>
  <div class="pulse"></div>
</div>
<div class="term">SCANNING TARGET > _</div>

<script>
// 配置：雷达目标点数量
const TARGET_COUNT = 8;

// 生成随机目标点
function generateTargets() {
  const radar = document.getElementById('radar');
  const radarSize = 360; // 雷达尺寸
  const centerX = radarSize / 2;
  const centerY = radarSize / 2;
  const maxRadius = radarSize / 2 - 20; // 留边距

  for (let i = 0; i < TARGET_COUNT; i++) {
    const target = document.createElement('div');
    target.className = 'target';
    
    // 第一个点设为红色警报点
    if (i === 0) {
      target.classList.add('alert');
    }
    
    // 随机角度和半径
    const angle = Math.random() * Math.PI * 2;
    const radius = Math.random() * maxRadius;
    
    // 计算位置
    const x = centerX + radius * Math.cos(angle);
    const y = centerY + radius * Math.sin(angle);
    
    target.style.left = x + 'px';
    target.style.top = y + 'px';
    target.style.animationDelay = (Math.random() * 2) + 's';
    
    radar.appendChild(target);
  }
}

// 页面加载时生成目标点
generateTargets();
</script>
</body>
</html>
